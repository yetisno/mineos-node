# This workflow will do a clean installation of node dependencies and run tests across different versions of node
# For more information see: https://help.github.com/actions/language-and-framework-guides/using-nodejs-with-github-actions

name: Node.js CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build:

    runs-on: ubuntu-22.04

    strategy:
      matrix:
        node-version: [12.x, 14.x, 16.x]
        # See supported Node.js release schedule at https://nodejs.org/en/about/releases/

    steps:
    - uses: actions/checkout@v2
    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v2
      with:
        node-version: ${{ matrix.node-version }}
    - uses: abbbi/github-actions-tune@v1
    - name : Update sources
      run: sudo apt-get update -y
    - name: Install rdiff-backup
      run: sudo apt-get install rdiff-backup -y
    - run: cp test/custom.conf .
    - run: npm install
    - run: npm ci
    - run: sudo env PATH="$PATH" ./node_modules/.bin/nodeunit ./test
